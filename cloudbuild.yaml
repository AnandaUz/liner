steps:
  # Инициализируем git submodules (_base и др.)
  - name: 'gcr.io/cloud-builders/git'
    args: ['submodule', 'update', '--init', '--recursive']

  # Собираем Docker образ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/liner/liner-api'
      - '.'

  # Пушим образ в Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/liner/liner-api'

  # Деплоим на Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'liner-api'
      - '--image=asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/liner/liner-api'
      - '--region=asia-south2'
      - '--platform=managed'

images:
  - 'asia-south2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/liner/liner-api'
